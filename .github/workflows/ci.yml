name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # use Node 20 in CI
          cache: npm # cache npm dependencies

      - name: Install
        run: npm ci # clean install for CI

      - name: Lint
        run: npm run lint # lint checks

      - name: Typecheck
        run: npm run typecheck # tsc --noEmit

      - name: Test
        run: npm test # vitest with coverage

      - name: Audit
        run: npm audit --audit-level=high || true # non-blocking security audit

      - name: Build
        run: npm run build # production build
